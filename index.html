<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>그림판</title>
    <link rel="stylesheet" href="./css/reset.css">
    <style>
        body {
            width: 100%;
            height: 100vh;
            overflow: hidden ;
        }

        #container{
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #toolBar{
            width: 100%;
            height: 70px;
            background-color: #222;

            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            padding: 0 40px;
        }

        #toolBar div *{
            color: #fff;
            font-weight: bold;
            margin-right: 10px;
        }

        #toolBar div{
            display: flex;
            align-items: center;
        }

        #toolBar div button{
            border: none;
            background-color: #000;
            border: 1px solid #fff;
            color: white;
            padding: 5px 30px;
            border-radius: 10px;
        }

         #toolBar div button:hover{
            background-color: #fff;
            color: #000;
         }

        #toolBar div input {
            color: #000;
            width: 100px;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="toolBar">
            <div>
                <label for="strokeColor">색상 :</label>
                <input type="color" id="strokeColor" value="#000"/>

                <label for="lineWidth">선굵기 :</label>
                <input type="number" id="lineWidth" value="2" min="1" max="50"/>
            </div>
            <div>
                <label for="bgColor">배경색상 :</label>
                <input type="color" id="bgColor" value="#000"/>

                <button id="undo">되돌리기</button>
                <button id="reset">모두 지우기</button>
                <!-- 
                a 태그 기능
                <a herf="img/abcd.jpg download"> 다운로드 할 수 있음
                 -->
                <button id="downfile">이미지 다운로드</button>
            </div>
        </div>
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const canvas = document.querySelector("canvas")
        const toolBar = document.getElementById("toolBar")
        let history = []

        canvas.width = window.innerWidth
        canvas.height = window.innerHeight - toolBar.offsetHeight;

        let canvasOffsetX = canvas.offsetLeft
        let canvasOffsetY = canvas.offsetTop

        let isDrawing = false;

        let startX;
        let startY;
        let lineWidth  = 2

        const ctx = canvas.getContext("2d")

        //선색상, 선굵기 변경 이벤트
        toolBar.addEventListener("change", function(e){
            if(e.target.id === "strokeColor"){
                ctx.strokeStyle = e.target.value;
            }

            if(e.target.id === "lineWidth"){
                lineWidth = e.target.value
            }

            if(e.target.id === "bgColor"){
                canvas.style.backgroundColor = e.target.value
            }
        })

        toolBar.addEventListener("click", function(e){
            if(e.target.id === "downfile"){
                let link = document.createElement("a")
                link.download = 'drawing.png' //다운로드 될 파일이름
                link.href = canvas.toDataURL("image/png")
                link.click()
            }
        })

        canvas.addEventListener("mousedown", function(e){
            history.push(ctx.getImageData(0, 0, canvas.width, canvas.height));

            isDrawing = true;
            startX = e.clientX
            startY = e.clientY

            ctx.moveTo(e.clientX,e.clientY - canvasOffsetY);
        })

        canvas.addEventListener("mousemove", function(e){
            if(!isDrawing) return
            ctx.lineWidth = lineWidth
            ctx.lineCap = "round" 
            ctx.lineTo(e.clientX , e.clientY - canvasOffsetY)
            ctx.stroke()

        })

        canvas.addEventListener("mouseup" ,function(e){
            isDrawing = false;
            ctx.beginPath()
        })

        toolBar.addEventListener("click",function(e){
            if(e.target.id === "undo"){
                if(history.length > 0){
                    const previousState = history.pop()
                    ctx.putImageData(previousState, 0, 0)
                }
            }


            if(e.target.id === "reset"){
                ctx.clearRect(0,0,canvas.width,canvas.height)
                history = []
            }
        })

    </script>
    
</body>
</html>
